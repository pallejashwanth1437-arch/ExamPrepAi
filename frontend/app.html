<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ExamPrep AI — AI-powered exam preparation: chat, quizzes, flashcards, summaries, and analytics">
  <title>ExamPrep AI — Dashboard</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Instrument+Serif:ital,wght@0,400;1,400&family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- HLS Library CDN -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <!-- Main Stylesheets -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>
  <h2 class="sr-only">ExamPrep AI — AI-powered exam preparation platform with chat, quizzes, flashcards, summaries, and analytics</h2>
  
  <!-- Cinematic Background Video and spotlight wrapper -->
  <div class="app-bg-wrapper">
    <div class="video-container">
      <video id="bg-video" autoplay muted loop playsinline></video>
    </div>
    <div class="vignette"></div>
    <div class="spotlight"></div>
    <div class="glow-node glow-1"></div>
    <div class="glow-node glow-2"></div>
    <div class="bg-grid"></div>
  </div>

  <style>
    /* Styling for the background elements in app.html */
    .app-bg-wrapper {
      position: fixed;
      inset: 0;
      z-index: -1;
      background: #000000;
      overflow: hidden;
      pointer-events: none;
    }
    .video-container {
      position: absolute;
      inset: 0;
    }
    #bg-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.15; /* Subtle background play for workspace readability */
      transition: opacity 0.5s ease;
    }
    body.auth-theme #bg-video {
      opacity: 0.55; /* Higher opacity for login and signup screens */
    }
    .vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, transparent 35%, rgba(0, 0, 0, 0.9) 100%);
    }
    .spotlight {
      position: absolute;
      inset: 0;
      transition: opacity 0.3s;
      background: radial-gradient(600px at 0px 0px, rgba(99, 102, 241, 0.08), transparent 85%);
      opacity: 0;
    }
    .glow-node {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.04;
      transition: opacity 0.5s ease;
    }
    body.auth-theme .glow-node {
      opacity: 0.06;
    }
    .glow-1 {
      top: 15%;
      left: 10%;
      width: 350px;
      height: 350px;
      background: #6366f1;
    }
    .glow-2 {
      bottom: 15%;
      right: 10%;
      width: 450px;
      height: 450px;
      background: #a855f7;
    }
    .bg-grid {
      position: absolute;
      inset: 0;
      background-size: 60px 60px;
      background-image: 
        linear-gradient(to right, rgba(255, 255, 255, 0.02) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      opacity: 0.45;
    }
  </style>

  <script>
    // Initialize HLS video
    const video = document.getElementById('bg-video');
    const videoUrl = 'https://stream.mux.com/kimF2ha9zLrX64H00UgLGPflCzNtl1T0215MlAmeOztv8.m3u8';
    
    if (video) {
      if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = videoUrl;
      } else if (typeof Hls !== 'undefined' && Hls.isSupported()) {
        const hls = new Hls({
          maxMaxBufferLength: 8,
          enableWorker: true,
          lowLatencyMode: true
        });
        hls.loadSource(videoUrl);
        hls.attachMedia(video);
      }
    }

    // Initialize Mouse Spotlight
    const spotlight = document.querySelector('.spotlight');
    if (spotlight) {
      document.addEventListener('mousemove', (e) => {
        spotlight.style.opacity = 1;
        spotlight.style.background = `radial-gradient(600px at ${e.clientX}px ${e.clientY}px, rgba(99, 102, 241, 0.08), transparent 85%)`;
      });
      document.addEventListener('mouseleave', () => {
        spotlight.style.opacity = 0;
      });
    }
  </script>

  <div id="root"></div>

  <!-- Entry JavaScript Module -->
  <script type="module">
    import { navigate } from './js/state.js';
    import { render } from './js/router.js';

    // Expose navigate globally so inline HTML onclick triggers can route views
    window.navigate = navigate;

    // Check if a simple hash route was requested (e.g. app.html#login or app.html#signup)
    // NOTE: state.js already checks for OAuth access_token in hash at module load time.
    // Only use hash routing if the hash is a plain page name (not an OAuth token).
    const hash = window.location.hash.replace('#', '');
    const validRoutes = ['login', 'signup', 'dashboard', 'landing', 'chat', 'quizzes', 'flashcards', 'summaries', 'questions', 'analytics', 'profile', 'documents', 'settings'];
    
    if (hash && validRoutes.includes(hash)) {
      // Clean the URL, then navigate to the requested page
      window.history.replaceState(null, null, window.location.pathname);
      navigate(hash);
    } else {
      // Boot the application (shows landing or dashboard if logged in)
      render();
    }
  </script>
</body>
</html>
