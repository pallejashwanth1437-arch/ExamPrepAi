<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ExamPrep AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg0:#080c14;--bg1:#0d1117;--bg2:#111827;--bg3:#1a2235;
--card:#141c2e;--card2:#1e2d45;
--accent:#6366f1;--accent2:#818cf8;--accent3:#a5b4fc;
--cyan:#06b6d4;--green:#10b981;--amber:#f59e0b;--red:#ef4444;--pink:#ec4899;
--text1:#f8fafc;--text2:#94a3b8;--text3:#475569;
--border:#1e2d45;--border2:#2d3f5e;
--glow:rgba(99,102,241,0.15);
--font:'Inter',system-ui,sans-serif;
}
html{font-family:var(--font);background:var(--bg0);color:var(--text1);font-size:14px;line-height:1.5;overflow-x:hidden}
body{min-height:100vh}
.sr-only{position:absolute;width:1px;height:1px;padding:0;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}

/* LAYOUT */
.app{display:flex;min-height:100vh}
.sidebar{width:220px;min-height:100vh;background:var(--bg1);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;z-index:100;transition:transform .3s}
.main{margin-left:220px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{height:56px;background:rgba(8,12,20,0.9);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:12px;position:sticky;top:0;z-index:50;backdrop-filter:blur(12px)}
.content{flex:1;overflow-y:auto}

/* SIDEBAR */
.logo{padding:20px 18px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--cyan));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.logo-text{font-size:15px;font-weight:700;background:linear-gradient(135deg,#fff,var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav{flex:1;padding:12px 10px;overflow-y:auto}
.nav-section{margin-bottom:4px}
.nav-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);padding:8px 8px 4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;cursor:pointer;color:var(--text2);font-size:13px;font-weight:500;transition:all .15s;position:relative;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:var(--bg3);color:var(--text1)}
.nav-item.active{background:rgba(99,102,241,0.15);color:var(--accent3)}
.nav-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:20px;background:var(--accent);border-radius:0 2px 2px 0}
.nav-icon{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.sidebar-bottom{padding:12px 10px;border-top:1px solid var(--border)}
.user-mini{display:flex;align-items:center;gap:10px;padding:8px;border-radius:8px;cursor:pointer}
.user-mini:hover{background:var(--bg3)}
.avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--pink));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.user-info{flex:1;min-width:0}
.user-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-plan{font-size:11px;color:var(--accent3)}

/* TOPBAR */
.search-bar{flex:1;max-width:400px;position:relative}
.search-bar input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:7px 12px 7px 32px;color:var(--text1);font-size:13px;outline:none;transition:border-color .2s}
.search-bar input:focus{border-color:var(--accent)}
.search-bar input::placeholder{color:var(--text3)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.icon-btn{width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:var(--bg2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);font-size:15px;transition:all .15s}
.icon-btn:hover{background:var(--bg3);color:var(--text1)}
.badge{width:7px;height:7px;background:var(--accent);border-radius:50%;position:absolute;top:6px;right:6px;border:1.5px solid var(--bg0)}
.page-title{font-size:13px;font-weight:600;color:var(--text2);display:flex;align-items:center;gap:6px}

/* PAGES */
.page{display:none;padding:24px}
.page.active{display:block}

/* CARDS */
.glass-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;transition:all .2s}
.glass-card:hover{border-color:var(--border2)}
.glass-card.glow:hover{box-shadow:0 0 24px var(--glow)}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:20px}

/* STAT CARDS */
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;position:relative;overflow:hidden}
.stat-card::after{content:'';position:absolute;top:-20px;right:-20px;width:60px;height:60px;border-radius:50%;opacity:.06}
.stat-card.purple::after{background:var(--accent)}
.stat-card.cyan::after{background:var(--cyan)}
.stat-card.green::after{background:var(--green)}
.stat-card.amber::after{background:var(--amber)}
.stat-card.pink::after{background:var(--pink)}
.stat-card.red::after{background:var(--red)}
.stat-label{font-size:12px;color:var(--text3);font-weight:500;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.stat-val{font-size:26px;font-weight:700;letter-spacing:-.02em;background:linear-gradient(135deg,var(--text1),var(--text2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-sub{font-size:11px;color:var(--green);margin-top:4px}

/* SECTION HEADERS */
.sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sec-title{font-size:15px;font-weight:700}
.sec-action{font-size:12px;color:var(--accent3);cursor:pointer;font-weight:500}
.sec-action:hover{text-decoration:underline}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.btn-primary{background:linear-gradient(135deg,var(--accent),#4f46e5);color:#fff;box-shadow:0 0 16px rgba(99,102,241,0.3)}
.btn-primary:hover{box-shadow:0 0 24px rgba(99,102,241,0.5);transform:translateY(-1px)}
.btn-outline{background:transparent;color:var(--text2);border:1px solid var(--border2)}
.btn-outline:hover{background:var(--bg3);color:var(--text1)}
.btn-ghost{background:transparent;color:var(--text2)}
.btn-ghost:hover{color:var(--text1)}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-danger{background:rgba(239,68,68,0.12);color:var(--red);border:1px solid rgba(239,68,68,0.25)}
.btn-success{background:rgba(16,185,129,0.12);color:var(--green);border:1px solid rgba(16,185,129,0.25)}

/* TAGS/BADGES */
.badge-pill{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-purple{background:rgba(99,102,241,0.15);color:var(--accent3)}
.badge-cyan{background:rgba(6,182,212,0.12);color:var(--cyan)}
.badge-green{background:rgba(16,185,129,0.12);color:var(--green)}
.badge-amber{background:rgba(245,158,11,0.12);color:var(--amber)}
.badge-red{background:rgba(239,68,68,0.12);color:var(--red)}
.badge-pink{background:rgba(236,72,153,0.12);color:var(--pink)}

/* PROGRESS */
.progress-bar{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .5s}

/* CHAT */
.chat-layout{display:grid;grid-template-columns:220px 1fr;gap:0;height:calc(100vh - 56px)}
.chat-docs{border-right:1px solid var(--border);padding:16px;overflow-y:auto}
.chat-main{display:flex;flex-direction:column}
.messages{flex:1;overflow-y:auto;padding:20px}
.msg{display:flex;gap:12px;margin-bottom:20px}
.msg-avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700}
.msg-ai .msg-avatar{background:linear-gradient(135deg,var(--accent),var(--cyan))}
.msg-user .msg-avatar{background:linear-gradient(135deg,var(--pink),var(--amber))}
.msg-bubble{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 16px;max-width:600px;line-height:1.6;font-size:13.5px}
.msg-user .msg-bubble{background:rgba(99,102,241,0.1);border-color:rgba(99,102,241,0.2);margin-left:auto}
.msg-user{flex-direction:row-reverse}
.typing-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--accent3);animation:blink 1.2s infinite}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
.chat-input-area{padding:16px;border-top:1px solid var(--border)}
.chat-input-wrap{background:var(--card);border:1px solid var(--border2);border-radius:12px;display:flex;align-items:flex-end;gap:8px;padding:10px 12px;transition:border-color .2s}
.chat-input-wrap:focus-within{border-color:var(--accent)}
.chat-input{flex:1;background:none;border:none;color:var(--text1);font-size:13.5px;resize:none;outline:none;max-height:120px;line-height:1.5}
.chat-input::placeholder{color:var(--text3)}
.suggested-qs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.suggested-q{padding:6px 12px;background:var(--card);border:1px solid var(--border);border-radius:20px;font-size:12px;cursor:pointer;color:var(--text2);white-space:nowrap;transition:all .15s}
.suggested-q:hover{border-color:var(--accent);color:var(--accent3)}

/* FLASHCARDS */
.flashcard-scene{perspective:1000px;width:100%;max-width:500px;height:280px;margin:0 auto 24px;cursor:pointer}
.flashcard{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .6s cubic-bezier(.4,.2,.2,1)}
.flashcard.flipped{transform:rotateY(180deg)}
.card-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:18px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px;text-align:center}
.card-front{background:linear-gradient(135deg,var(--card),var(--card2));border:1px solid var(--border2)}
.card-back{background:linear-gradient(135deg,rgba(99,102,241,0.1),rgba(6,182,212,0.08));border:1px solid rgba(99,102,241,0.25);transform:rotateY(180deg)}
.card-label{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);margin-bottom:16px}
.card-q{font-size:18px;font-weight:600;line-height:1.4}
.card-a{font-size:15px;line-height:1.6;color:var(--accent3)}

/* QUIZ */
.quiz-opt{padding:14px 18px;background:var(--card);border:1.5px solid var(--border);border-radius:10px;cursor:pointer;margin-bottom:10px;font-size:13.5px;transition:all .15s;display:flex;align-items:center;gap:12px}
.quiz-opt:hover{border-color:var(--accent);background:rgba(99,102,241,0.05)}
.quiz-opt.selected{border-color:var(--accent);background:rgba(99,102,241,0.1);color:var(--accent3)}
.quiz-opt.correct{border-color:var(--green);background:rgba(16,185,129,0.08);color:var(--green)}
.quiz-opt.wrong{border-color:var(--red);background:rgba(239,68,68,0.08);color:var(--red)}
.opt-letter{width:28px;height:28px;border-radius:7px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}

/* CHARTS */
.chart-bar{display:flex;align-items:flex-end;gap:8px;height:120px;border-left:1px solid var(--border);border-bottom:1px solid var(--border);padding-bottom:0}
.bar-col{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.bar{width:100%;border-radius:4px 4px 0 0;min-height:4px;transition:height .4s}
.bar-label{font-size:10px;color:var(--text3)}

/* DOCUMENTS */
.doc-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;display:flex;align-items:flex-start;gap:14px;transition:all .2s}
.doc-card:hover{border-color:var(--border2);box-shadow:0 4px 20px rgba(0,0,0,.2)}
.doc-icon{width:40px;height:48px;background:linear-gradient(135deg,rgba(239,68,68,0.15),rgba(239,68,68,0.05));border:1px solid rgba(239,68,68,0.2);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:20px}
.doc-info{flex:1;min-width:0}
.doc-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.doc-meta{font-size:11px;color:var(--text3);margin-top:4px}
.doc-actions{display:flex;gap:6px;margin-top:10px}

/* UPLOAD */
.upload-zone{border:2px dashed var(--border2);border-radius:14px;padding:48px 24px;text-align:center;cursor:pointer;transition:all .2s}
.upload-zone:hover,.upload-zone.drag{border-color:var(--accent);background:rgba(99,102,241,0.04)}
.upload-icon{font-size:48px;margin-bottom:12px}

/* ANALYTICS BARS */
.analytic-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.analytic-label{width:100px;font-size:12px;color:var(--text2);flex-shrink:0}
.analytic-bar-wrap{flex:1;height:8px;background:var(--bg3);border-radius:4px;overflow:hidden}
.analytic-bar-fill{height:100%;border-radius:4px}
.analytic-val{width:36px;font-size:12px;font-weight:600;text-align:right;flex-shrink:0}

/* LANDING */
.landing{min-height:100vh;display:flex;flex-direction:column}
.hero{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:80px 24px 60px;position:relative;overflow:hidden}
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 20%,rgba(99,102,241,0.12),transparent);pointer-events:none}
.hero-bg2{position:absolute;inset:0;background:radial-gradient(ellipse 40% 40% at 20% 80%,rgba(6,182,212,0.06),transparent);pointer-events:none}
.hero-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(99,102,241,0.1);border:1px solid rgba(99,102,241,0.25);border-radius:20px;padding:5px 14px;font-size:12px;color:var(--accent3);margin-bottom:24px;font-weight:500}
.hero-h1{font-size:56px;font-weight:800;line-height:1.1;letter-spacing:-.03em;margin-bottom:20px;max-width:700px}
.hero-h1 span{background:linear-gradient(135deg,var(--accent3),var(--cyan),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero-sub{font-size:17px;color:var(--text2);max-width:500px;line-height:1.6;margin-bottom:36px}
.hero-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-bottom:48px}
.btn-hero-primary{padding:13px 28px;font-size:15px;font-weight:700;background:linear-gradient(135deg,var(--accent),#4f46e5);color:#fff;border-radius:10px;border:none;cursor:pointer;box-shadow:0 0 32px rgba(99,102,241,0.35);transition:all .2s}
.btn-hero-primary:hover{box-shadow:0 0 48px rgba(99,102,241,0.5);transform:translateY(-2px)}
.btn-hero-secondary{padding:12px 28px;font-size:15px;font-weight:600;background:transparent;color:var(--text2);border-radius:10px;border:1px solid var(--border2);cursor:pointer;transition:all .2s}
.btn-hero-secondary:hover{color:var(--text1);border-color:var(--text2);background:var(--bg2)}
.hero-stats{display:flex;gap:32px;padding-top:40px;border-top:1px solid var(--border)}
.hero-stat-num{font-size:24px;font-weight:800;background:linear-gradient(135deg,var(--text1),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero-stat-label{font-size:12px;color:var(--text3)}
.features-section{padding:64px 24px;background:var(--bg1)}
.features-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;max-width:1100px;margin:0 auto}
.feature-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:22px;transition:all .25s}
.feature-card:hover{border-color:var(--border2);transform:translateY(-3px);box-shadow:0 8px 32px rgba(0,0,0,.25)}
.feature-icon{font-size:28px;margin-bottom:12px}
.feature-title{font-size:14px;font-weight:700;margin-bottom:6px}
.feature-desc{font-size:12px;color:var(--text2);line-height:1.5}
.lp-nav{height:60px;display:flex;align-items:center;padding:0 32px;background:rgba(8,12,20,0.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.lp-nav-logo{font-size:17px;font-weight:800;background:linear-gradient(135deg,#fff,var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-right:auto}

/* SETTINGS TOGGLE */
.toggle{width:40px;height:22px;background:var(--border2);border-radius:11px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;border:none}
.toggle.on{background:var(--accent)}
.toggle::after{content:'';width:18px;height:18px;background:#fff;border-radius:50%;position:absolute;top:2px;left:2px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.toggle.on::after{left:20px}

/* SUMMARY */
.summary-block{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;line-height:1.7;font-size:13.5px;color:var(--text2)}
.summary-block p{margin-bottom:12px}
.summary-block p:last-child{margin-bottom:0}
.key-point{display:inline;background:rgba(99,102,241,0.12);color:var(--accent3);padding:1px 5px;border-radius:4px}

/* PROFILE */
.profile-cover{height:120px;background:linear-gradient(135deg,rgba(99,102,241,0.3),rgba(6,182,212,0.2),rgba(16,185,129,0.15));border-radius:14px 14px 0 0;position:relative}
.profile-avatar{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--pink));display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;border:3px solid var(--bg1);position:absolute;bottom:-36px;left:24px}
.achieve-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center}
.achieve-icon{font-size:28px;margin-bottom:8px}
.achieve-val{font-size:20px;font-weight:800;color:var(--accent3)}
.achieve-label{font-size:11px;color:var(--text3);margin-top:2px}

/* IQ CARD */
.iq-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;display:flex;align-items:center;gap:12px;margin-bottom:8px}
.iq-icon{font-size:20px;width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* DARK SPARKLE GRID */
.particles{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.particle{position:absolute;width:2px;height:2px;border-radius:50%;background:var(--accent3);opacity:0;animation:float linear infinite}
@keyframes float{0%{opacity:0;transform:translateY(0) scale(1)}20%{opacity:.6}80%{opacity:.4}100%{opacity:0;transform:translateY(-80px) scale(.5)}}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}

/* ACTIVE GLOW LINES */
.glow-line{height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.4}

/* INLINE INPUT */
input[type=text],input[type=email],input[type=password],select,textarea{background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text1);padding:9px 12px;font-size:13px;outline:none;width:100%;transition:border-color .2s;font-family:var(--font)}
input[type=text]:focus,input[type=email]:focus,input[type=password]:focus,select:focus,textarea:focus{border-color:var(--accent)}
select option{background:var(--bg2);color:var(--text1)}
label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px}
.form-row{margin-bottom:14px}

/* AUTH */
.auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg0);padding:24px}
.auth-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:36px 32px;width:100%;max-width:400px;box-shadow:0 24px 80px rgba(0,0,0,.4)}
.auth-logo{display:flex;align-items:center;gap:10px;margin-bottom:28px;justify-content:center}
.auth-title{font-size:22px;font-weight:800;text-align:center;margin-bottom:6px}

/* PAGE HEADER */
.page-header{margin-bottom:24px}
.page-header h1{font-size:22px;font-weight:800;margin-bottom:4px}
.page-header p{font-size:13px;color:var(--text2)}

/* CIRCULAR SCORE */
.score-circle{position:relative;width:110px;height:110px}
.score-circle svg{transform:rotate(-90deg)}
.score-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.score-num{font-size:22px;font-weight:800}
.score-label{font-size:10px;color:var(--text3)}

/* RESPONSIVE */
@media(max-width:768px){
.sidebar{transform:translateX(-220px)}.main{margin-left:0}
.grid-4{grid-template-columns:repeat(2,1fr)}.grid-3{grid-template-columns:1fr}
.features-grid{grid-template-columns:repeat(2,1fr)}.hero-h1{font-size:36px}
.chat-layout{grid-template-columns:1fr}.chat-docs{display:none}
}

function sendChatMsg(text) {
  chatMessages.push({role:'user',text});
  isTyping = true;
  render();
  setTimeout(()=>{
    isTyping = false;
    chatMessages.push({role:'ai',text:`Based on your document, here's what I found about "<strong>${text}</strong>":<br><br>
    This is a key concept covered in Chapter 3 (pages 24–31). The material describes fundamental principles with applications in multiple areas. <span style="background:rgba(99,102,241,.12);color:var(--accent3);padding:2px 6px;border-radius:4px;font-size:12px">📍 Source: pg. 26</span><br><br>
    Would you like me to expand on any specific aspect or generate practice questions?`});
    render();
    const container = document.getElementById('messages-container');
    if(container) container.scrollTop = container.scrollHeight;
  }, 1500);
}

function sendChat() {
  const input = document.getElementById('chat-input');
  const text = input?.value?.trim();
  if(!text) return;
  chatInput = '';
  sendChatMsg(text);
}

function startQuiz() { quizState={q:0,selected:null,answered:false,score:0,started:true,finished:false}; render(); }
function resetQuiz() { quizState={q:0,selected:null,answered:false,score:0,started:false,finished:false}; render(); }
function selectOpt(i) {
  if(quizState.answered) return;
  quizState.selected = i;
  quizState.answered = true;
  if(i === QUIZ_DATA[quizState.q].correct) quizState.score++;
  render();
}
function nextQ() {
  if(quizState.q >= QUIZ_DATA.length-1) { quizState.finished=true; render(); return; }
  quizState.q++;
  quizState.selected=null;
  quizState.answered=false;
  render();
}

function attachListeners() {}

// Init particles on landing
function initParticles() {
  const el = document.getElementById('particles');
  if(!el) return;
  for(let i=0;i<20;i++){
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${Math.random()*6}s;animation-duration:${4+Math.random()*4}s`;
    el.appendChild(p);
  }
}

render();
setTimeout(initParticles, 100);

const origRender = render;
window.render = function() {
  origRender();
  setTimeout(initParticles, 50);
};
</script>
